<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Vendedor - Martinello</title>

    <!-- TEMA SEM FLASH: aplica antes do primeiro render -->
    <script>
        (function(){
            var t = localStorage.getItem('tema');
            if (t === 'dark') document.documentElement.classList.add('dark-mode-pre');
        })();
    </script>
    <style>
        /* Aplicado antes do body carregar — evita flash branco */
        html.dark-mode-pre body { background: #1a1a1a !important; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase -->

    <!-- MVP -->

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --primary:        #d0252a;
            --primary-dark:   #a01d21;
            --whatsapp-color: #25D366;
            --whatsapp-dark:  #128C7E;
            --bg-light:       #f4f4f4;
            --bg-dark:        #1a1a1a;
            --card-light:     white;
            --card-dark:      #2d2d2d;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background .3s, color .3s;
        }

        /* DARK MODE */
        body.dark-mode { background: var(--bg-dark); color: white; }
        body.dark-mode .card           { background: var(--card-dark); border-color: #444; }
        body.dark-mode input           { background: #3d3d3d; color: white; border-color: #555; }
        body.dark-mode .product-image  { border-color: #444; }
        body.dark-mode .info-panel     { background: #333; color: #ccc; border-color: #444; }
        body.dark-mode .mensagem-embreve { background:#3d3d3d; color:#ffd700; border:1px solid #ffd700; }

        /* HEADER */
        .header {
            background: var(--primary);
            padding: 25px 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(208,37,42,.3);
            position: relative;
        }
        .logo-image { height:100px; width:auto; object-fit:contain; }

        .dark-mode-toggle {
            position:absolute; right:20px;
            background:rgba(255,255,255,.2); border:none; color:white;
            width:40px; height:40px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:20px; transition:.3s;
        }
        .dark-mode-toggle:hover { background:rgba(255,255,255,.3); transform:rotate(180deg); }

        /* MAIN */
        .main-container {
            flex:1; display:flex; align-items:center; justify-content:center; padding:20px;
        }

        .card {
            background: var(--card-light);
            padding: 25px 20px; border-radius:30px;
            max-width:450px; width:100%;
            box-shadow: 0 20px 40px rgba(208,37,42,.15);
            border: 1px solid rgba(208,37,42,.1);
        }

        h2 {
            font-weight:800; font-size:28px; color:var(--primary);
            margin-bottom:20px; text-transform:uppercase; text-align:center;
            letter-spacing:.5px; position:relative; display:inline-block; width:100%;
        }
        h2:after {
            content:''; display:block; width:60px; height:4px;
            background:var(--primary); margin:12px auto 0; border-radius:2px;
        }

        /* IMAGEM */
        .image-container {
            width:100%; margin-bottom:20px; display:flex;
            align-items:center; justify-content:center;
            background:transparent; min-height:380px;
        }
        .product-image {
            max-width:100%; max-height:380px; width:auto; height:auto;
            object-fit:contain; border-radius:20px;
            transition:transform .3s;
            box-shadow:0 10px 20px rgba(0,0,0,.1);
            border:3px solid white;
        }
        .product-image:hover { transform:scale(1.02); box-shadow:0 15px 30px rgba(208,37,42,.2); }

        /* INPUT */
        .input-group { position:relative; margin:20px 0; }
        .input-icon  { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--primary); font-size:18px; }
        input {
            width:100%; padding:15px 15px 15px 45px;
            border:2px solid #e0e0e0; border-radius:15px;
            font-size:16px; font-family:'Montserrat',sans-serif;
            transition:border-color .3s, box-shadow .3s; background:white;
        }
        input:focus  { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(208,37,42,.1); }
        input:disabled { background:#f0f0f0; cursor:not-allowed; opacity:.6; }

        /* BOTÃO PRINCIPAL */
        .btn-primary {
            background:var(--primary); color:white; border:none;
            padding:18px; width:100%; border-radius:15px;
            font-weight:700; cursor:pointer; font-size:18px;
            text-transform:uppercase; transition:.3s;
            box-shadow:0 8px 15px rgba(208,37,42,.3);
        }
        .btn-primary:hover:not(:disabled) {
            background:var(--primary-dark); transform:translateY(-2px);
            box-shadow:0 12px 20px rgba(208,37,42,.4);
        }
        .btn-primary:disabled { background:#999; cursor:not-allowed; opacity:.6; transform:none; box-shadow:none; }


        /* PAINEL INFO */
        .info-panel {
            font-size:13px; color:#666; margin-top:20px; padding:15px;
            background:#f9f9f9; border-radius:10px; border:1px solid #eee;
        }
        .info-panel div  { margin:8px 0; display:flex; align-items:center; gap:8px; }
        .info-panel i    { width:20px; color:var(--primary); font-size:14px; }
        .countdown-row   { font-weight:700; color:var(--primary); }

        /* STATUS */
        .status-text    { font-weight:600; padding:4px 10px; border-radius:20px; display:inline-block; font-size:11px; }
        .status-carregando { background:#17a2b8; color:white; }
        .status-ativo      { background:#28a745; color:white; }
        .status-embreve    { background:#ffc107; color:black; }

        /* SPINNER */
        .spinner {
            display:inline-block; width:20px; height:20px;
            border:3px solid rgba(255,255,255,.3); border-radius:50%;
            border-top-color:white; animation:spin 1s linear infinite;
            margin-right:10px; vertical-align:middle;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* GLOW */
        .glow { animation:glow 2s ease-in-out infinite; }
        @keyframes glow {
            0%,100% { box-shadow:0 8px 15px rgba(208,37,42,.3); }
            50%      { box-shadow:0 8px 25px rgba(208,37,42,.6); }
        }

        /* EM BREVE */
        .mensagem-embreve {
            color:#666; margin:15px 0; font-size:16px; line-height:1.5;
            padding:15px; background:#f0f0f0; border-radius:10px;
            display:none; white-space:pre-line; text-align:center;
        }

        /* WHATSAPP FLOAT */
        .whatsapp-float {
            position:fixed; bottom:30px; right:30px;
            background:var(--whatsapp-color); color:white;
            width:60px; height:60px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:30px; box-shadow:0 8px 20px rgba(37,211,102,.4);
            cursor:pointer; transition:.3s; z-index:1000;
            border:none; text-decoration:none; animation:pulse 2s infinite;
        }
        .whatsapp-float:hover { transform:scale(1.1); background:var(--whatsapp-dark); animation:none; }
        @keyframes pulse {
            0%   { box-shadow:0 0 0 0 rgba(37,211,102,.7); }
            70%  { box-shadow:0 0 0 15px rgba(37,211,102,0); }
            100% { box-shadow:0 0 0 0 rgba(37,211,102,0); }
        }

        /* NOTIFICAÇÕES */
        .notificacao {
            position:fixed; top:20px; right:20px; padding:14px 20px;
            border-radius:12px; color:white; font-weight:700;
            z-index:9999; animation:slideIn .3s ease;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
            display:flex; align-items:center; gap:10px;
            font-family:'Montserrat',sans-serif; font-size:14px;
        }
        .notificacao-sucesso { background:#28a745; }
        .notificacao-erro    { background:#dc3545; }
        .notificacao-saindo  { animation:slideOut .3s ease forwards; }
        @keyframes slideIn { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes slideOut{ from{transform:translateX(0);opacity:1} to{transform:translateX(110%);opacity:0} }

        /* RESPONSIVO */
        @media (max-width:768px) { .logo-image{height:90px;} h2{font-size:26px;} }
        @media (max-width:480px) {
            .logo-image{height:80px;}
            h2{font-size:24px;}
            h2:after{width:50px;height:3px;margin:8px auto 0;}
            .card{padding:20px 15px;}
            .btn-primary{font-size:16px;padding:16px;}
            .product-image{max-height:300px;}
            .image-container{min-height:300px;}
            .whatsapp-float{width:50px;height:50px;font-size:25px;bottom:20px;right:20px;}
            input{padding:14px 14px 14px 40px;}
        }
    </style>
</head>
<body>

<header class="header">
    <img src="img/logo.png" alt="Martinello" class="logo-image">
    <button class="dark-mode-toggle" onclick="TEMA.toggle()">
        <i class="fas fa-moon"></i>
    </button>
</header>

<div class="main-container">
    <div class="card">
        <h2 id="tituloPagina">DISPARO EM ANDAMENTO!</h2>

        <div class="image-container">
            <img id="fotoProduto" class="product-image" src="img/produto.png" alt="Produto" loading="lazy">
        </div>

        <div id="mensagemEmBreve" class="mensagem-embreve"></div>

        <div class="input-group">
            <i class="fas fa-tag input-icon"></i>
            <input
                type="text"
                id="cod"
                placeholder="DIGITE SUA MATRÍCULA AQUI!"
                oninput="validarMatricula(this)"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="5"
                autocomplete="off">
        </div>

        <button class="btn-primary" onclick="enviar()" id="btnEnviar">
            <span class="btn-text">GERAR E ENVIAR NO WHATSAPP</span>
        </button>


        <div class="info-panel">
            <div>
                <i class="fas fa-clock"></i>
                <strong>Horário Brasília:</strong>
                <span id="infoHoraBrasilia"></span>
            </div>
            <div>
                <i class="fas fa-tag"></i>
                <strong>Oferta:</strong>
                <span id="infoOferta">EM BREVE</span>
            </div>
            <div class="countdown-row" id="infoCountdown" style="display:none;">
                <i class="fas fa-hourglass-half"></i>
                <span></span>
            </div>
            <div>
                <i class="fas fa-info-circle"></i>
                <strong>Status:</strong>
                <span id="infoStatus" class="status-text status-carregando">CARREGANDO...</span>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/556598115091" class="whatsapp-float" target="_blank" rel="noopener">
    <i class="fab fa-whatsapp"></i>
</a>


<script src="shared/diagnostico.js"></script>
    <!-- Scripts — carregados no final para garantir ordem em todos os browsers -->
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-database-compat.js"></script>
    <script src="shared/config.js"></script>
    <script src="shared/utils.js"></script>
    <script src="model/firebase-config.js"></script>
    <script src="model/horario.js"></script>
    <script src="model/storage.js"></script>
    <script src="model/validators.js"></script>
    <script src="view/ui.js"></script>
    <script src="presenter/api.js"></script>
    <script src="presenter/index-presenter.js"></script>
</body>
</html>
